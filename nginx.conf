# Rate limiting configuration (must reside in http context)
# Note: If this file is included in sites-enabled (inside http context), these directives are valid.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Default catch-all server block to drop direct IP scans and prevent bypassing Cloudflare protection
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    
    # Reject direct IP SSL handshakes (requires Nginx 1.19.4+)
    ssl_reject_handshake on;
    ssl_certificate /etc/letsencrypt/live/avn-academy-training-netlify-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avn-academy-training-netlify-app.ru/privkey.pem;

    server_name _;
    return 444;
}

# Active redirect to HTTPS
server {
    listen 80;
    server_name avn-academy.ru www.avn-academy.ru avn-academy-training-netlify-app.ru;

    # HTTP to HTTPS redirect
    return 301 https://$host$request_uri;
}

# Main Secure Production Server Block
server {
    listen 443 ssl http2;
    server_name avn-academy.ru www.avn-academy.ru avn-academy-training-netlify-app.ru;

    # SSL Certificate Configuration
    ssl_certificate /etc/letsencrypt/live/avn-academy-training-netlify-app.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avn-academy-training-netlify-app.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cloudflare IP Addresses for Real IP detection
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    real_ip_header CF-Connecting-IP;

    # ─── Security Headers ────────────────────────────────────────────────
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy (XSS Mitigation)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https://discord.com https://cdn.discordapp.com; connect-src 'self' https://discord.com;" always;

    # ─── Gzip Compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2
        font/woff;

    # Serve pre-compressed static assets directly from disk (supported by vite Compression plugin)
    gzip_static on;

    root /var/www/avn-academy-training/dist;
    index index.html;

    # ─── Static Assets: Immutable Cache (hashed filenames) ───────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── Images & Media: Long Cache ──────────────────────────────────────
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|mp3|woff2|woff|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── Favicon ─────────────────────────────────────────────────────────
    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ─── SPA Fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html — no-cache (always check for updates via ETag)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }
    }

    # ─── Proxy: FastAPI backend ──────────────────────────────────────────
    location /fastapi-api/ {
        # Limit requests at proxy layer to protect api endpoints (10 req/s, burst of 20)
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;  # Increased for OpenAI essay evaluations in synchronous paths
        proxy_send_timeout 10s;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── Proxy: Supabase Edge Functions (Deno) ───────────────────────────
    location /supabase-api/ {
        # Limit requests at proxy layer to protect api endpoints
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:54321/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 90s;
        proxy_send_timeout 10s;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
