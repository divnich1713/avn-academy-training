version: '3.8'

services:
  db:
    image: mirror.gcr.io/library/postgres:17-alpine
    ports:
      - "54322:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    restart: always
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db_migration:
    build: ./backend_fastapi
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - SCHEMA=t_p29017774_avn_academy_training
    command: python db_migrations/migrate.py
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend_fastapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379/0
      - SCHEMA=t_p29017774_avn_academy_training
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      redis:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 512m
    cpus: 1.0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: ./worker
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_pass}@redis:6379/0
      - SCHEMA=t_p29017774_avn_academy_training
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      redis:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 512m
    cpus: 1.0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  supabase_functions:
    image: mirror.gcr.io/denoland/deno:alpine
    ports:
      - "54321:54321"
    volumes:
      - .:/app
    working_dir: /app/supabase/functions
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - SCHEMA=t_p29017774_avn_academy_training
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    command: run --allow-net --allow-env --allow-read --allow-write main.ts
    depends_on:
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 256m
    cpus: 0.5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - VITE_USE_MOCK=false
      - VITE_TESTING_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    restart: always
    mem_limit: 512m
    cpus: 0.5

volumes:
  redis_data:
  db_data:
