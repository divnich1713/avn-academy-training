version: '3.8'

services:
  db:
    image: mirror.gcr.io/library/postgres:17-alpine
    ports:
      - "127.0.0.1:54322:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    mem_limit: 1024m
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_prod_pass}
    restart: always
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      # Evaluated inside container shell
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_secure_prod_pass} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  db_migration:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
      network: host
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
    command: python db_migrations/migrate.py
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
      network: host
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_prod_pass}@redis:6379/0
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      redis:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 1024m
    cpus: 2.0

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      network: host
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_prod_pass}@redis:6379/0
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      redis:
        condition: service_healthy
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 1024m
    cpus: 2.0

  supabase_functions:
    image: mirror.gcr.io/denoland/deno:alpine
    ports:
      - "127.0.0.1:54321:54321"
    volumes:
      - .:/app
    working_dir: /app/supabase/functions
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    command: run --allow-net --allow-env --allow-read --allow-write main.ts
    depends_on:
      db_migration:
        condition: service_completed_successfully
    restart: always
    mem_limit: 512m
    cpus: 1.0

volumes:
  redis_data:
  db_data:
