version: '3.8'

services:
  db:
    image: mirror.gcr.io/library/postgres:17-alpine
    ports:
      - "127.0.0.1:54322:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  db_migration:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
    command: python db_migrations/migrate.py
    depends_on:
      - db

  api:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - REDIS_URL=redis://redis:6379/0
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      - redis
      - db_migration
    restart: always

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - REDIS_URL=redis://redis:6379/0
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    depends_on:
      - redis
      - db_migration
    restart: always

  supabase_functions:
    image: mirror.gcr.io/denoland/deno:alpine
    ports:
      - "127.0.0.1:54321:54321"
    volumes:
      - .:/app
    working_dir: /app/supabase/functions
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/postgres}
      - SCHEMA=${SCHEMA:-t_p29017774_avn_academy_training}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
    command: run --allow-net --allow-env --allow-read --allow-write main.ts
    depends_on:
      - db_migration
    restart: always

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
  db_data:
