# =============================================================================
# AVN Academy — Optimized Nginx Configuration
# =============================================================================
# Применение:
#   1. Скопировать на сервер (например в /etc/nginx/sites-available/avn-academy)
#   2. Создать симлинк: ln -s /etc/nginx/sites-available/avn-academy /etc/nginx/sites-enabled/
#   3. Проверить: nginx -t
#   4. Перезагрузить: systemctl reload nginx
#
# ВАЖНО: Замените пути и домен на актуальные!
# =============================================================================

# ─── Gzip Settings (глобально, в http {} блоке или здесь) ────────────────────
# Если уже есть в /etc/nginx/nginx.conf — убрать дублирование

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff2
    font/woff
    application/font-woff
    application/font-woff2;

# Включить отдачу pre-compressed .gz файлов (если есть)
gzip_static on;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name avn-academy.ru www.avn-academy.ru;

    # ─── SSL (пути к сертификатам — подставьте свои) ─────────────────────────
    # ssl_certificate /etc/letsencrypt/live/avn-academy.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/avn-academy.ru/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/avn-academy.ru/chain.pem;

    # ─── SSL Hardening ───────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Root ────────────────────────────────────────────────────────────────
    # ЗАМЕНИТЕ на актуальный путь к dist-директории
    root /var/www/avn-academy/dist;
    index index.html;

    # ─── Security Headers ────────────────────────────────────────────────────
    server_tokens off;  # Скрыть версию nginx

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Static Assets: Immutable Cache (hashed filenames) ───────────────────
    # Файлы вида /assets/vendor-react-rvcbB0xh.js — хеш в имени гарантирует
    # что при изменении контента имя файла изменится → безопасно кешировать навсегда
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Включить gzip для этих файлов
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;

        access_log off;
    }

    # ─── Images & Media: Long Cache ──────────────────────────────────────────
    location ~* \.(webp|png|jpg|jpeg|gif|ico|svg|mp3|woff2|woff|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── Favicon ─────────────────────────────────────────────────────────────
    location = /favicon.svg {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ─── API Proxy (Supabase Edge Functions) ─────────────────────────────────
    location /supabase-api/ {
        proxy_pass http://127.0.0.1:54321/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Не кешировать API-ответы
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ─── SPA Fallback ────────────────────────────────────────────────────────
    # index.html НЕ кешируется (no-cache) — чтобы браузер всегда проверял
    # наличие обновлений через ETag/Last-Modified
    location / {
        try_files $uri $uri/ /index.html;

        # Только для index.html — no-cache
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }
    }
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name avn-academy.ru www.avn-academy.ru;
    return 301 https://$host$request_uri;
}
